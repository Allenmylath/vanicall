# fly.toml app configuration file generated for vanicall on 2026-06-22T16:27:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vanicall'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  RECONCILE_INTERVAL_SECS = '600'
  RECONCILE_SETTLE_SECS = '300'
  RUST_LOG = 'info,tower_http=info'

[processes]
  reconciler = 'reconcile'
  web = 'vanicall'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['web']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
